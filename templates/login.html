<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #111827,
                #1e293b
            );

            min-height: 100vh;

           

            justify-content: center;

            align-items: center;

            font-family: Arial;
        }

        .login-card {

            width: 420px;

            background: rgba(255,255,255,0.08);

            backdrop-filter: blur(15px);

            border-radius: 20px;

            padding: 40px;

            box-shadow:
            0 0 30px rgba(0,255,255,0.2);

            color: white;
        }

        .title {

            text-align: center;

            margin-bottom: 30px;

            font-size: 32px;

            font-weight: bold;
        }

        .form-control {

            background: rgba(255,255,255,0.1);

            border: none;

            color: white;

            height: 50px;
        }

        .form-control:focus {

            background: rgba(255,255,255,0.15);

            color: white;

            box-shadow: none;
        }

        .btn-login {

            background: cyan;

            color: black;

            font-weight: bold;

            height: 50px;

            border-radius: 12px;

            transition: 0.3s;
        }

        .btn-login:hover {

            transform: scale(1.03);
        }

        a {

            color: cyan;

            text-decoration: none;
        }

    </style>

</head>

<body>
{% include 'header.html' %}
<div class="container d-flex
            justify-content-center
            align-items-center"
     style="min-height: 85vh;">
    <div class="login-card">

        <div class="title">

            AI Interviewer Login

        </div>

        <form method="POST" action="/login">

            <div class="mb-4">

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter Email"
                    required
                >

            </div>

            <div class="mb-4">

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter Password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-login w-100">

                Login

            </button>

        </form>

        <div class="text-center mt-4">

            Don't have account?

            <a href="/register">

                Register

            </a>

        </div>

    </div>
    </div>
    {% include 'footer.html' %}
</body>

</html>
