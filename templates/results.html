<!DOCTYPE html>
<html>
<head>
    <title>Results</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/results.css') }}">
</head>
<body>

<div class="container py-5">

        <div class="skills-grid">

            <div class="skill-card">
                Communication

            </div>

            <div class="skill-card">
                Technical Skills
                <span>9/10</span>
            </div>

            <div class="skill-card">
                Confidence
                <span>7/10</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
