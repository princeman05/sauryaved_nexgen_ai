<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Text To Speech

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Main CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body class="dashboard-body">

<!-- =========================
NAVBAR
========================= -->

<nav
    class="
        navbar
        navbar-expand-lg
        navbar-dark
        glass-navbar
    "
>

    <div class="container">

        <a
            class="navbar-brand fw-bold"
            href="/dashboard"
        >

            🤖 AI Interviewer

        </a>

        <div class="ms-auto">

            <a href="/utilities">

                <button
                    class="
                        btn
                        btn-info
                    "
                >

                    ← Back

                </button>

            </a>

        </div>

    </div>

</nav>

<!-- =========================
MAIN SECTION
========================= -->

<div class="container py-5">

    <div
        class="
            feature-card
            p-5
        "
    >

        <h1
            class="
                text-center
                mb-4
            "
        >

            🔊 Text To Speech

        </h1>

        <p
            class="
                text-center
                text-light
                mb-5
            "
        >

            Convert text into realistic speech
            in multiple languages.

        </p>

        <!-- LANGUAGE -->

        <div class="mb-4">

            <label class="form-label">

                Select Language

            </label>

            <select
                id="language"
                class="form-select"
            >

                <option value="en-US">

                    English

                </option>

                <option value="hi-IN">

                    Hindi

                </option>

                <option value="fr-FR">

                    French

                </option>

                <option value="es-ES">

                    Spanish

                </option>

            </select>

        </div>

        <!-- TEXT -->

        <textarea
            id="text"
            rows="10"
            class="
                form-control
                mb-4
            "
            placeholder="Enter text here..."
        ></textarea>

        <!-- CONTROLS -->

        <div
            class="
                d-flex
                gap-3
                justify-content-center
                flex-wrap
            "
        >

            <button
                class="
                    btn
                    btn-success
                    btn-lg
                "
                onclick="speakText()"
            >

                ▶ Speak

            </button>

            <button
                class="
                    btn
                    btn-danger
                    btn-lg
                "
                onclick="stopSpeech()"
            >

                ⛔ Stop

            </button>

            <button
                class="
                    btn
                    btn-warning
                    btn-lg
                "
                onclick="clearText()"
            >

                🗑 Clear

            </button>

        </div>

        <!-- STATUS -->

        <div
            class="
                text-center
                mt-4
            "
        >

            <h5 id="status">

                Status: Ready

            </h5>

        </div>

    </div>

</div>

<!-- =========================
SCRIPT
========================= -->

<script>

let speech

function speakText() {

    const text = document
    .getElementById(
        'text'
    ).value

    const language = document
    .getElementById(
        'language'
    ).value

    speech = new SpeechSynthesisUtterance(
        text
    )

    speech.lang = language

    speech.rate = 1

    speech.pitch = 1

    speech.volume = 1

    window.speechSynthesis.speak(
        speech
    )

    document
    .getElementById(
        'status'
    ).innerHTML =

    "🔊 Speaking..."
}

function stopSpeech() {

    window
    .speechSynthesis
    .cancel()

    document
    .getElementById(
        'status'
    ).innerHTML =

    "⛔ Speech Stopped"
}

function clearText() {

    document
    .getElementById(
        'text'
    ).value = ''

    document
    .getElementById(
        'status'
    ).innerHTML =

    "🗑 Text Cleared"
}

</script>

</body>

</html>
