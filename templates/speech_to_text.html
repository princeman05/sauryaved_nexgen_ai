<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Speech To Text

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Main CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body class="dashboard-body">

<!-- =========================
NAVBAR
========================= -->

<nav
    class="
        navbar
        navbar-expand-lg
        navbar-dark
        glass-navbar
    "
>

    <div class="container">

        <a
            class="navbar-brand fw-bold"
            href="/dashboard"
        >

            🤖 AI Interviewer

        </a>

        <div class="ms-auto">

            <a href="/utilities">

                <button
                    class="
                        btn
                        btn-info
                    "
                >

                    ← Back

                </button>

            </a>

        </div>

    </div>

</nav>

<!-- =========================
MAIN SECTION
========================= -->

<div class="container py-5">

    <div
        class="
            feature-card
            p-5
        "
    >

        <h1
            class="
                text-center
                mb-4
            "
        >

            🎤 Speech To Text

        </h1>

        <p
            class="
                text-center
                text-light
                mb-5
            "
        >

            Convert your voice into text
            in real time using AI speech recognition.

        </p>

        <!-- LANGUAGE -->

        <div class="mb-4">

            <label class="form-label">

                Select Language

            </label>

            <select
                id="language"
                class="form-select"
            >

                <option value="en-US">

                    English

                </option>

                <option value="hi-IN">

                    Hindi

                </option>

                <option value="gu-IN">

                    Gujarati

                </option>

                <option value="mr-IN">

                    Marathi

                </option>

            </select>

        </div>

        <!-- TEXT AREA -->

        <textarea
            id="output"
            rows="10"
            class="
                form-control
                mb-4
            "
            placeholder="Your speech will appear here..."
        ></textarea>

        <!-- BUTTONS -->

        <div
            class="
                d-flex
                gap-3
                flex-wrap
                justify-content-center
            "
        >

            <button
                class="
                    btn
                    btn-warning
                    btn-lg
                "
                onclick="startListening()"
            >

                🎤 Start Listening

            </button>

            <button
                class="
                    btn
                    btn-danger
                    btn-lg
                "
                onclick="stopListening()"
            >

                ⛔ Stop

            </button>

            <button
                class="
                    btn
                    btn-success
                    btn-lg
                "
                onclick="copyText()"
            >

                📋 Copy Text

            </button>

        </div>

        <!-- STATUS -->

        <div
            class="
                text-center
                mt-4
            "
        >

            <h5 id="status">

                Status: Idle

            </h5>

        </div>

    </div>

</div>

<!-- =========================
SCRIPT
========================= -->

<script>

let recognition

function startListening() {

    recognition = new (

        window.SpeechRecognition ||

        window.webkitSpeechRecognition
    )()

    const language = document
    .getElementById(
        'language'
    ).value

    recognition.lang = language

    recognition.continuous = true

    recognition.interimResults = true

    recognition.start()

    document
    .getElementById(
        'status'
    ).innerHTML =

    "🎙 Listening..."

    recognition.onresult = function(event) {

        let transcript = ''

        for (

            let i = 0;

            i < event.results.length;

            i++
        ) {

            transcript += event
            .results[i][0]
            .transcript
        }

        document
        .getElementById(
            'output'
        ).value = transcript
    }
}

function stopListening() {

    if (recognition) {

        recognition.stop()

        document
        .getElementById(
            'status'
        ).innerHTML =

        "⛔ Stopped"
    }
}

function copyText() {

    const text = document
    .getElementById(
        'output'
    )

    text.select()

    document.execCommand(
        'copy'
    )

    alert(
        'Text Copied ✅'
    )
}

</script>

</body>

</html>
