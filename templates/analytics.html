<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        Analytics Dashboard

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Chart.js -->

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Main CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body
    style="
        background:#0f172a;
        color:white;
    "
>

<div class="container py-5">

    <!-- =========================
    HEADER
    ========================= -->

    <div
        class="
            d-flex
            justify-content-between
            align-items-center
            flex-wrap
            mb-5
        "
    >

        <div>

            <h1 class="main-title">

                📊 Analytics Dashboard

            </h1>

            <p class="sub-title">

                AI Interview performance insights
                & recruiter analytics

            </p>

        </div>

        <div>

            <a href="/dashboard">

                <button
                    class="btn btn-info btn-custom"
                >

                    ⬅ Back to Dashboard

                </button>

            </a>

        </div>

    </div>

    <!-- =========================
    STATS CARDS
    ========================= -->

    <div class="row g-4 mb-5">

        <!-- TOTAL -->

        <div class="col-lg-3">

            <div class="feature-card text-center">

                <h1 class="text-info">

                    {{ total }}

                </h1>

                <p>

                    Total Interviews

                </p>

            </div>

        </div>

        <!-- HIGHEST -->

        <div class="col-lg-3">

            <div class="feature-card text-center">

                <h1 class="text-success">

                    {{ highest }}%

                </h1>

                <p>

                    Highest Score

                </p>

            </div>

        </div>

        <!-- AVERAGE -->

        <div class="col-lg-3">

            <div class="feature-card text-center">

                <h1 class="text-warning">

                    {{ average }}%

                </h1>

                <p>

                    Average Score

                </p>

            </div>

        </div>

        <!-- LOWEST -->

        <div class="col-lg-3">

            <div class="feature-card text-center">

                <h1 class="text-danger">

                    {{ lowest }}%

                </h1>

                <p>

                    Lowest Score

                </p>

            </div>

        </div>

    </div>

    <!-- =========================
    FIRST ROW CHARTS
    ========================= -->

    <div class="row g-4">

        <!-- BAR CHART -->

        <div class="col-lg-6">

            <div class="feature-card">

                <h3 class="mb-4">

                    📈 Candidate Scores

                </h3>

                <canvas id="scoreChart"></canvas>

            </div>

        </div>

        <!-- PIE CHART -->

        <div class="col-lg-6">

            <div class="feature-card">

                <h3 class="mb-4">

                    🧠 Interview Categories

                </h3>

                <canvas id="categoryChart"></canvas>

            </div>

        </div>

    </div>

    <!-- =========================
    SECOND ROW CHARTS
    ========================= -->

    <div class="row g-4 mt-2">

        <!-- TREND LINE -->

        <div class="col-lg-6">

            <div class="feature-card">

                <h3 class="mb-4">

                    📊 Performance Trend

                </h3>

                <canvas id="trendChart"></canvas>

            </div>

        </div>

        <!-- TOP CANDIDATES -->

        <div class="col-lg-6">

            <div class="feature-card">

                <h3 class="mb-4">

                    🏆 Top Candidates

                </h3>

                <canvas id="topChart"></canvas>

            </div>

        </div>

    </div>

</div>

<!-- =========================
CHART SCRIPTS
========================= -->

<script>

    // =========================
    // BAR CHART
    // =========================

    new Chart(

        document.getElementById('scoreChart'),

        {

            type: 'bar',

            data: {

                labels: {{ usernames|safe }},

                datasets: [{

                    label: 'Interview Scores',

                    data: {{ scores|safe }},

                    borderWidth: 1

                }]

            },

            options: {

                responsive: true,

                scales: {

                    y: {

                        beginAtZero: true,

                        max: 100

                    }

                }

            }

        }

    );

    // =========================
    // PIE CHART
    // =========================

    new Chart(

        document.getElementById('categoryChart'),

        {

            type: 'pie',

            data: {

                labels: {{ categories|safe }},

                datasets: [{

                    data: {{ category_counts|safe }}

                }]

            }

        }

    );

    // =========================
    // TREND LINE CHART
    // =========================

    new Chart(

        document.getElementById('trendChart'),

        {

            type: 'line',

            data: {

                labels: {{ trend_labels|safe }},

                datasets: [{

                    label: 'Performance Trend',

                    data: {{ trend_scores|safe }},

                    tension: 0.4,

                    fill: false

                }]

            },

            options: {

                responsive: true,

                scales: {

                    y: {

                        beginAtZero: true,

                        max: 100

                    }

                }

            }

        }

    );

    // =========================
    // TOP CANDIDATES
    // =========================

    new Chart(

        document.getElementById('topChart'),

        {

            type: 'doughnut',

            data: {

                labels: {{ top_names|safe }},

                datasets: [{

                    data: {{ top_scores|safe }}

                }]

            }

        }

    );

</script>

</body>

</html>
