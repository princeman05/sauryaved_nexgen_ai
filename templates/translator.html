<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>

        AI Translator

    </title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >

</head>

<body class="dashboard-body">

<!-- NAVBAR -->

<nav
    class="
        navbar
        navbar-dark
        glass-navbar
    "
>

    <div class="container">

        <a
            class="navbar-brand fw-bold"
            href="/dashboard"
        >

            🤖 AI Interviewer

        </a>

        <a href="/utilities">

            <button
                class="
                    btn
                    btn-info
                "
            >

                ← Back

            </button>

        </a>

    </div>

</nav>

<!-- MAIN -->

<div class="container py-5">

    <div
        class="
            feature-card
            p-5
        "
    >

        <h1
            class="
                text-center
                mb-4
            "
        >

            🌍 AI Translator

        </h1>

        <p
            class="
                text-center
                text-light
                mb-5
            "
        >

            Translate text instantly
            into multiple languages.

        </p>

        <!-- FORM -->

        <form method="POST">

            <!-- TEXT -->

            <textarea
                name="text"
                rows="8"
                class="
                    form-control
                    mb-4
                "
                placeholder="Enter text here..."
                required
            ></textarea>

            <!-- LANGUAGE -->

            <select
                name="language"
                class="
                    form-select
                    mb-4
                "
            >

                <option value="hi">

                    Hindi

                </option>

                <option value="gu">

                    Gujarati

                </option>

                <option value="mr">

                    Marathi

                </option>

                <option value="fr">

                    French

                </option>

                <option value="es">

                    Spanish

                </option>

            </select>

            <!-- BUTTON -->

            <button
                type="submit"
                class="
                    btn
                    btn-success
                    w-100
                    btn-lg
                "
            >

                🚀 Translate

            </button>

        </form>

        <!-- OUTPUT -->

        {% if translated_text %}

        <div
            class="
                mt-5
            "
        >

            <h3>

                ✅ Translated Text

            </h3>

            <div
                class="
                    alert
                    alert-info
                    mt-3
                "
            >

                {{ translated_text }}

            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
